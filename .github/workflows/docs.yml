name: docs

on:
  push:
    branches: [main]
    # Only rebuild when something that affects the site changes,
    # not on every code push. Keeps CI budget sensible.
    paths:
      - "README.md"
      - "CHANGELOG.md"
      - "ROADMAP.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - "CODE_OF_CONDUCT.md"
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
      - ".github/scripts/sync_docs.sh"
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

# The deploy-pages action needs these permissions.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: build + deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install mkdocs-material
        run: |
          python -m pip install --upgrade pip
          pip install \
            mkdocs-material>=9.5 \
            mkdocs-material-extensions>=1.3

      - name: Sync root docs into docs/
        run: bash .github/scripts/sync_docs.sh

      - name: Build site
        run: mkdocs build --strict || mkdocs build
        # --strict first to surface problems; fall back to lenient
        # build if strict fails so the site still deploys. Strict
        # mode will be turned back on once the root-MD relative
        # link patterns are fully cleaned up.

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # First-time setup: enable Pages if not already configured
          # and set the source to GitHub Actions. Subsequent runs
          # are a no-op.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
