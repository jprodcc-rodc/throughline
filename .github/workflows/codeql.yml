name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan, Monday 06:00 UTC. Catches CVEs disclosed against
    # our transitive deps even on weeks without commits.
    - cron: "0 6 * * 1"

# Every run analyses the full repo state, so concurrent runs would
# just produce duplicate alerts. Cancel in-flight on new pushes.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: analyze (python)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          # The default query suite catches most real issues without
          # the false-positive flood of `security-extended`.
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
