name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs for the same branch/PR when a new push lands.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        # F = pyflakes (dead imports / unused vars / syntax-adjacent),
        # E9 = actual syntax errors. Intentionally permissive — v0.3
        # can widen to pycodestyle E/W + isort I once the style debt
        # is addressed deliberately.
        run: ruff check --select F,E9 .

  pytest:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test-only dependencies
        # The heavy runtime deps (torch, transformers, uvicorn) are
        # lazily imported by their callers — the test suite mocks
        # every call site that would touch them, so CI can skip
        # the multi-GB install entirely and finish in < 1 min.
        run: |
          python -m pip install --upgrade pip
          pip install \
            pytest>=8.0 \
            fastapi>=0.110 \
            pydantic>=2.0 \
            pyyaml>=6.0 \
            watchdog>=3.0 \
            rich>=13.0 \
            markdownify>=0.11

      - name: Run pytest
        env:
          # Keep CI deterministic: disable any accidental LLM calls
          # and force the lightest backend aliases if a test ever
          # creates an embedder / reranker instance.
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          COHERE_API_KEY: ""
        run: |
          pytest fixtures/ -q --tb=short
