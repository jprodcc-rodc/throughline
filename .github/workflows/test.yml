name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs for the same branch/PR when a new push lands.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test-only dependencies
        # The heavy runtime deps (torch, transformers, uvicorn) are
        # lazily imported by their callers — the test suite mocks
        # every call site that would touch them, so CI can skip
        # the multi-GB install entirely and finish in < 1 min.
        run: |
          python -m pip install --upgrade pip
          pip install \
            pytest>=8.0 \
            fastapi>=0.110 \
            pydantic>=2.0 \
            pyyaml>=6.0 \
            watchdog>=3.0 \
            rich>=13.0 \
            markdownify>=0.11

      - name: Run pytest
        env:
          # Keep CI deterministic: disable any accidental LLM calls
          # and force the lightest backend aliases if a test ever
          # creates an embedder / reranker instance.
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          COHERE_API_KEY: ""
        run: |
          pytest fixtures/ -q --tb=short
